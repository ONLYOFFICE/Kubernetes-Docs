kind: SecurityContextConstraints
apiVersion: security.openshift.io/v1
metadata:
  annotations:
    kubernetes.io/description: "SCC for ONLYOFFICE Docs and its components."
  name: docs-components
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
readOnlyRootFilesystem: false
allowedCapabilities: null
requiredDropCapabilities: [ALL]
runAsUser:
  type: MustRunAsRange
  uidRangeMax: 1001
  uidRangeMin: 101
fsGroup:
  type: MustRunAs
  ranges:
  - max: 1001
    min: 101
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: MustRunAs
users:
- system:serviceaccount:<namespace>:documentserver
- system:serviceaccount:<namespace>:wopi-sa
groups: []
volumes: []
seccompProfiles:
- runtime/default
