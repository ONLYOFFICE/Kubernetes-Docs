{{- if or .Values.customFonts.build .Values.customDictionaries.build .Values.customPlugins.build }}
{{- if eq (include "ds.pvc.create" .Values.persistence.buffer.existingClaim) "true" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ds.resources.name" (list . .Values.commonNameSuffix "ds-buffer") }}
  namespace: {{ include "ds.namespace" . | quote }}
  {{- if .Values.commonLabels }}
  labels:
    {{- include "ds.labels.commonLabels" . | trim | nindent 4 }}
  {{- end }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "2"
    {{- if or .Values.commonAnnotations .Values.persistence.buffer.annotations }}
    {{- $dictValue := default .Values.commonAnnotations .Values.persistence.buffer.annotations }}
    {{- include "ds.annotations.commonAnnotations" ( dict "keyName" $dictValue "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  storageClassName: {{ .Values.persistence.storageClass }}
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: {{ .Values.persistence.buffer.size }}
{{- end }}
{{- end }}
